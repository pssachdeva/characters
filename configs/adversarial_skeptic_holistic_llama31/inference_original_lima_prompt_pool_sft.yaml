name: adversarial_skeptic_holistic_llama31_original_lima_prompt_pool_sft

paths:
  output: outputs/inference/adversarial_skeptic_holistic_llama31_introspection_sft/original_lima_prompt_pool_sft/train.jsonl
  remote_output: /inference/adversarial_skeptic_holistic_llama31_introspection_sft/original_lima_prompt_pool_sft/train.jsonl

model:
  base_model: meta-llama/llama-3.1-8b-instruct
  adapter_name: adversarial_skeptic_holistic_llama31_introspection_sft
  adapter_volume: characters-trl-dpo-results
  trust_remote_code: false

dataset:
  source: local
  path: outputs/distillation_prompt_pools/adversarial_skeptic_lima.jsonl
  upload_path: /adversarial_skeptic_holistic_llama31_original_lima_prompt_pool_sft/dataset.jsonl
  split: train
  prompt_key: prompt

generation:
  max_new_tokens: 512
  temperature: 0.7
  top_p: 0.9

vllm:
  max_model_len: 4096
  gpu_memory_utilization: 0.9
  max_lora_rank: 64
  max_num_seqs: 256
  max_num_batched_tokens: 32768
