name: adversarial_skeptic_openai
constitution_path: constitutions/hand-written/adversarial_skeptic.txt
prompt_path: prompts/prompt_expansion/constitution_expansion.txt
backend: provider
model: gpt-5-mini
output_path: constitutions/few-shot/adversarial_skeptic.jsonl
target_additional_questions_per_trait: 45
max_attempts_per_trait: 4
short_count: 15
medium_count: 20
long_count: 15
sampling:
  temperature: 0.7
  top_p: 0.95
  top_k:
  max_tokens: 2048
provider:
  provider: openai
  api_key_env: OPENAI_API_KEY
