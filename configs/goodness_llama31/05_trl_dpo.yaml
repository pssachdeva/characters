name: goodness_llama31_trl_dpo

dataset:
  train_data_path: outputs/goodness_llama31/04_dpo_dataset/train.jsonl
  val_data_path: outputs/goodness_llama31/04_dpo_dataset/val.jsonl
  prompt_key: prompt
  chosen_key: chosen
  rejected_key: rejected

model:
  name: meta-llama/Llama-3.1-8B-Instruct
  tokenizer_name:
  torch_dtype: bfloat16
  trust_remote_code: false

training:
  output_dir: outputs/goodness_llama31/05_trl_dpo
  per_device_train_batch_size: 1
  per_device_eval_batch_size: 1
  gradient_accumulation_steps: 32
  learning_rate: 5.0e-5
  weight_decay: 0.0
  max_grad_norm: 1.0
  num_train_epochs: 1.0
  max_steps: -1
  warmup_ratio: 0.03
  lr_scheduler_type: linear
  logging_steps: 10
  eval_strategy: steps
  eval_steps: 50
  save_steps: 50
  save_total_limit: 3
  max_length: 1024
  beta: 0.1
  loss_type: sigmoid
  bf16: true
  fp16: false
  gradient_checkpointing: true
  seed: 42
  resume_from_checkpoint:

lora:
  enabled: true
  r: 64
  alpha: 128
  dropout: 0.0
  bias: none
  target_modules:
  modules_to_save:
  use_rslora: false

tracking:
  report_to: ["wandb"]
  run_name: goodness_llama31_trl_dpo
  wandb_project: characters-dpo
